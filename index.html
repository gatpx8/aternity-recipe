<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 マタニティ献立ダイアリー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sakura: #F8C8D4; --sakura-deep: #E8A0B4; --sakura-pale: #FFF0F3;
    --green: #7BA889; --green-light: #D4E8D0;
    --cream: #FFF9F0; --gold: #D4A853;
    --text: #3A2E2A; --text-mid: #6B5B54; --text-light: #9B8B84;
    --paper: #FFFBF5; --border: #E8DDD4;
    --shadow: rgba(58,46,42,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Zen Maru Gothic', sans-serif; background: var(--cream);
    color: var(--text); line-height: 1.9; font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Sakura bg ===== */
  .sakura-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .petal {
    position: absolute; width: 12px; height: 12px; background: var(--sakura);
    border-radius: 50% 0 50% 50%; opacity: 0.22; animation: fall linear infinite;
  }
  .petal:nth-child(1){left:8%;animation-duration:14s;width:10px;height:10px}
  .petal:nth-child(2){left:22%;animation-duration:18s;animation-delay:2s;width:14px;height:14px}
  .petal:nth-child(3){left:38%;animation-duration:12s;animation-delay:5s}
  .petal:nth-child(4){left:54%;animation-duration:16s;animation-delay:1s;width:8px;height:8px}
  .petal:nth-child(5){left:68%;animation-duration:20s;animation-delay:3s;width:11px;height:11px}
  .petal:nth-child(6){left:82%;animation-duration:15s;animation-delay:7s}
  @keyframes fall {
    0%{top:-20px;transform:rotate(0) translateX(0);opacity:.25}
    50%{transform:rotate(180deg) translateX(35px);opacity:.15}
    100%{top:105vh;transform:rotate(360deg) translateX(-15px);opacity:0}
  }

  /* ===== Progress ===== */
  .progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--sakura-deep),var(--green));z-index:100;transition:width .1s linear}

  /* ===== Header ===== */
  .site-header {
    position: relative; z-index: 1; text-align: center;
    padding: 60px 24px 48px;
    background:
      radial-gradient(ellipse at 20% 80%,rgba(248,200,212,.3) 0%,transparent 50%),
      radial-gradient(ellipse at 80% 20%,rgba(212,168,83,.1) 0%,transparent 50%),
      var(--cream);
  }
  .site-header h1 {
    font-family:'Zen Old Mincho',serif; font-size:clamp(1.6rem,4.5vw,2.4rem);
    font-weight:700; line-height:1.5; margin-bottom:12px;
  }
  .site-header h1 .accent{color:var(--sakura-deep)}
  .site-header h1 .green{color:var(--green)}
  .site-subtitle{font-size:.92rem;color:var(--text-mid);max-width:500px;margin:0 auto;line-height:1.9}
  .site-subtitle strong{color:var(--gold)}

  /* ===== Nav Tabs ===== */
  .nav-tabs {
    display:flex; justify-content:center; gap:8px; padding:0 24px 32px;
    position:relative; z-index:1;
  }
  .nav-tab {
    padding:10px 24px; border-radius:30px; border:2px solid var(--border);
    background:var(--paper); font-family:inherit; font-size:.88rem;
    font-weight:700; cursor:pointer; color:var(--text-mid);
    transition:all .3s ease;
  }
  .nav-tab:hover{border-color:var(--sakura);color:var(--sakura-deep)}
  .nav-tab.active{background:var(--sakura-deep);color:white;border-color:var(--sakura-deep)}

  /* ===== Main ===== */
  .main{position:relative;z-index:1;max-width:740px;margin:0 auto;padding:0 24px 80px}

  /* ===== Card ===== */
  .card {
    background:var(--paper); border-radius:20px; padding:44px 40px;
    margin-bottom:28px; box-shadow:0 4px 30px var(--shadow);
    border:1px solid rgba(232,221,212,.5);
  }
  @media(max-width:600px){.card{padding:28px 20px}}

  .section-label {
    display:inline-flex;align-items:center;gap:8px;
    font-size:.75rem;font-weight:700;color:var(--green);
    letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;
  }
  .section-label::before{content:'';display:inline-block;width:18px;height:2px;background:var(--green);border-radius:1px}
  .section-title{font-family:'Zen Old Mincho',serif;font-size:1.5rem;font-weight:700;margin-bottom:24px}

  /* ===== Date badge ===== */
  .date-badge {
    display:inline-block;padding:5px 16px;border-radius:30px;
    background:rgba(248,200,212,.15);border:1px solid rgba(248,200,212,.3);
    font-size:.78rem;color:var(--sakura-deep);font-weight:700;
    margin-bottom:16px;
  }

  /* ===== Menu card ===== */
  .menu-item {
    display:flex;align-items:center;gap:14px;padding:16px 20px;
    background:linear-gradient(135deg,var(--sakura-pale),var(--cream));
    border-radius:12px;border:1px solid rgba(248,200,212,.25);
    margin-bottom:10px;cursor:pointer;transition:all .3s ease;
  }
  .menu-item:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(248,200,212,.2)}
  .menu-num {
    flex-shrink:0;width:32px;height:32px;border-radius:50%;
    background:var(--sakura-deep);color:white;font-weight:700;font-size:.82rem;
    display:flex;align-items:center;justify-content:center;
  }
  .menu-name{font-size:.98rem;font-weight:700}
  .menu-time{font-size:.78rem;color:var(--text-light);margin-top:2px}

  /* ===== Recipe accordion ===== */
  .recipe-section{margin-bottom:24px}
  .recipe-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .recipe-emoji{font-size:1.5rem}
  .recipe-head h3{font-family:'Zen Old Mincho',serif;font-size:1.2rem;font-weight:700}
  .recipe-desc{color:var(--text-mid);font-size:.93rem;line-height:2;margin-bottom:16px}
  .toggle-btn {
    display:inline-flex;align-items:center;gap:8px;
    background:none;border:2px solid var(--sakura);color:var(--sakura-deep);
    padding:9px 20px;border-radius:30px;font-family:inherit;
    font-size:.88rem;font-weight:700;cursor:pointer;transition:all .3s ease;
  }
  .toggle-btn:hover{background:var(--sakura-pale);border-color:var(--sakura-deep)}
  .toggle-btn.open{background:var(--sakura-deep);color:white;border-color:var(--sakura-deep)}
  .recipe-body{max-height:0;overflow:hidden;opacity:0;transition:all .5s ease;margin-top:0}
  .recipe-body.show{max-height:3000px;opacity:1;margin-top:16px}

  /* Ingredients */
  .ing-box {
    background:linear-gradient(135deg,var(--sakura-pale),#FFF8F0);
    border-radius:14px;padding:22px 24px;margin-bottom:16px;
    border:1px solid rgba(248,200,212,.2);
  }
  @media(max-width:600px){.ing-box{padding:18px 14px}}
  .ing-box h4{font-family:'Zen Old Mincho',serif;font-size:1rem;margin-bottom:14px}
  .ing-box h4::after{content:'（2人分）';font-size:.75rem;font-weight:400;color:var(--text-light);font-family:'Zen Maru Gothic',sans-serif;margin-left:6px}
  .ing-list{list-style:none}
  .ing-list li{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed rgba(232,221,212,.5);font-size:.9rem}
  .ing-list li:last-child{border-bottom:none}
  .ing-name{font-weight:500}
  .ing-amt{color:var(--text-mid);font-size:.85rem;white-space:nowrap;margin-left:10px}

  /* Steps */
  .steps-box{background:var(--paper);border-radius:14px;padding:22px 24px;border:1px solid var(--border)}
  @media(max-width:600px){.steps-box{padding:18px 14px}}
  .steps-box h4{font-family:'Zen Old Mincho',serif;font-size:1rem;margin-bottom:16px}
  .step{display:flex;gap:14px;margin-bottom:16px;align-items:flex-start}
  .step:last-child{margin-bottom:0}
  .step-n{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--green);color:white;font-weight:700;font-size:.78rem;display:flex;align-items:center;justify-content:center;margin-top:2px}
  .step-t{color:var(--text-mid);font-size:.9rem;line-height:1.85;flex:1}

  /* Tip */
  .tip {
    display:flex;align-items:flex-start;gap:10px;padding:14px 18px;
    background:linear-gradient(135deg,#FFF8E1,#FFF3CC);border-radius:12px;
    font-size:.88rem;color:var(--text-mid);line-height:1.8;
    border-left:3px solid var(--gold);margin-top:16px;
  }

  /* ===== Nutrient cards ===== */
  .nut-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:20px}
  .nut-card{padding:16px;border-radius:12px;text-align:center;transition:transform .3s}
  .nut-card:hover{transform:translateY(-2px)}
  .nut-card.iron{background:linear-gradient(135deg,#FFE0E0,#FFC8C8)}
  .nut-card.folic{background:linear-gradient(135deg,#D4E8D0,#BCD8B4)}
  .nut-card.calcium{background:linear-gradient(135deg,#E0ECFF,#C8DCFF)}
  .nut-card.fiber{background:linear-gradient(135deg,#F0E4D0,#E4D4BC)}
  .nut-card .e{font-size:1.5rem;margin-bottom:6px}
  .nut-card h4{font-size:.88rem;font-weight:700;margin-bottom:4px}
  .nut-card p{font-size:.75rem;color:var(--text-mid);line-height:1.6}

  /* ===== Archive ===== */
  .archive-item {
    display:flex;align-items:center;gap:16px;padding:18px 22px;
    background:var(--paper);border-radius:14px;margin-bottom:10px;
    border:1px solid var(--border);cursor:pointer;transition:all .3s ease;
  }
  .archive-item:hover{border-color:var(--sakura);transform:translateY(-1px);box-shadow:0 4px 16px var(--shadow)}
  .archive-item.current{border-color:var(--sakura-deep);background:var(--sakura-pale)}
  .archive-date{font-size:.78rem;color:var(--text-light);font-weight:700;white-space:nowrap;min-width:90px}
  .archive-menus{font-size:.88rem;color:var(--text-mid);flex:1}

  /* ===== Closing ===== */
  .closing {
    background:linear-gradient(135deg,var(--sakura-pale),rgba(212,232,208,.3));
    border-radius:20px;padding:40px;text-align:center;
    border:1px solid rgba(248,200,212,.2);margin-bottom:28px;
  }
  .closing h3{font-family:'Zen Old Mincho',serif;font-size:1.2rem;margin-bottom:12px}
  .closing p{color:var(--text-mid);font-size:.93rem;line-height:2;max-width:540px;margin:0 auto}

  /* ===== Divider ===== */
  .divider{display:flex;align-items:center;justify-content:center;gap:16px;margin:40px 0;color:var(--sakura-deep);font-size:.7rem;letter-spacing:.4em;opacity:.5}
  .divider::before,.divider::after{content:'';height:1px;width:50px;background:var(--sakura)}

  /* ===== Footer ===== */
  footer{text-align:center;padding:32px 24px;color:var(--text-light);font-size:.78rem;position:relative;z-index:1}

  /* ===== Counter badge ===== */
  .counter{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:30px;background:var(--green);color:white;font-size:.78rem;font-weight:700;margin-bottom:20px}

  /* ===== Animations ===== */
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease}
  .fade-in.visible{opacity:1;transform:translateY(0)}

  /* ===== Hidden ===== */
  .hidden{display:none}

  /* ===== Open all ===== */
  .open-all{text-align:center;margin:24px 0 8px}
  .open-all-btn{background:var(--green);color:white;border:none;padding:11px 26px;border-radius:30px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .3s;box-shadow:0 3px 12px rgba(123,168,137,.3)}
  .open-all-btn:hover{background:#6A9A78;transform:translateY(-1px)}

  /* ===== Shopping list ===== */
  .shop-list{list-style:none;columns:2;column-gap:20px}
  @media(max-width:500px){.shop-list{columns:1}}
  .shop-list li{
    display:flex;align-items:center;gap:10px;padding:8px 0;
    border-bottom:1px dashed rgba(232,221,212,.4);font-size:.9rem;
    break-inside:avoid;
  }
  .shop-list li:last-child{border-bottom:none}
  .shop-check{
    flex-shrink:0;width:20px;height:20px;border-radius:6px;
    border:2px solid var(--border);background:white;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all .2s;font-size:.7rem;color:transparent;
  }
  .shop-check.checked{background:var(--green);border-color:var(--green);color:white}
  .shop-item-text{flex:1}
  .shop-item-text.checked{text-decoration:line-through;color:var(--text-light)}
</style>
</head>
<body>

<div class="progress" id="prog"></div>
<div class="sakura-bg"><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div></div>

<header class="site-header">
  <h1>🌸 <span class="accent">マタニティ</span>献立<span class="green">ダイアリー</span></h1>
  <p class="site-subtitle">妊娠<span id="month-label"></span>ヶ月の妻のために。<strong>鉄分・葉酸・カルシウム</strong>を意識した<br>毎日の献立を記録しています。</p>
</header>

<nav class="nav-tabs">
  <button class="nav-tab active" onclick="showView('latest')">🍽 今日の献立</button>
  <button class="nav-tab" onclick="showView('archive')">📅 アーカイブ</button>
</nav>

<main class="main">
  <div id="latestView"></div>
  <div id="archiveView" class="hidden"></div>
</main>

<footer>🌸 マタニティ献立ダイアリー — 2026</footer>

<script>
// =====================================================================
// 📌 レシピデータ — ここに新しい日の献立を追加していく
// 配列の最後が最新として表示される
// =====================================================================

  {

    shopping: [

      "にんじん：1本",
      "無調整豆乳：1パック",
      "菜の花：1束",
      "しらす干し：40g",
      "スパゲティ：160g",
      "小松菜：1束",
      "厚揚げ：1枚",
      "しめじ：1パック",
      "にんにく：1個",
      "白だし（なければ）",
      "オイスターソース（なければ）"
    ],

    ],

      {

          ["味噌","大さじ1"],["にんにく","1片"],

      },
      {

        ],

function fmtDate(d) {
  const dt = new Date(d + "T00:00:00");
  return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;
}

function isToday(dateStr) {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  return dateStr === `${yyyy}-${mm}-${dd}`;
}

function renderDish(dish, idx) {
  const id = `dish_${Date.now()}_${idx}`;
  return `
    <div class="recipe-section">
      <div class="recipe-head">
        <span class="recipe-emoji">${dish.emoji}</span>
        <h3>&#${9312+idx}; ${dish.name}</h3>
      </div>
      <p class="recipe-desc">${dish.desc}</p>
      <button class="toggle-btn" onclick="toggleDish(this,'${id}')">🥄 材料・手順を見る ▼</button>
      <div class="recipe-body" id="${id}">
        <div class="ing-box">
          <h4>📝 材料</h4>
          <ul class="ing-list">
            ${dish.ingredients.map(i => `<li><span class="ing-name">${i[0]}</span><span class="ing-amt">${i[1]}</span></li>`).join('')}
          </ul>
        </div>
        <div class="steps-box">
          <h4>👩‍🍳 手順</h4>
          ${dish.steps.map((s,i) => `<div class="step"><div class="step-n">${i+1}</div><div class="step-t">${s}</div></div>`).join('')}
        </div>
      </div>
      <div class="tip">
        <span>💡</span>
        <span><strong>コツ：</strong>${dish.tip}</span>
      </div>
    </div>
  `;
}

function renderDay(day) {
  return `
    <div class="card fade-in">
      <div class="date-badge">📅 ${fmtDate(day.date)}（${day.weekday}）</div>
      <div class="section-label">${isToday(day.date) ? "Today's Menu" : "Menu"}</div>
      <h2 class="section-title">🍽 ${isToday(day.date) ? '今日の献立' : 'この日の献立'}</h2>
      <div style="margin-bottom:20px">
        ${day.dishes.map((d,i) => `
          <div class="menu-item" onclick="document.getElementById('recipe_sec_${i}').scrollIntoView({behavior:'smooth'})">
            <div class="menu-num">${i+1}</div>
            <div>
              <div class="menu-name">${d.name}</div>
              <div class="menu-time">⏱ ${d.time}分</div>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="open-all">
        <button class="open-all-btn" onclick="toggleAll(this)">📖 すべてのレシピを開く</button>
      </div>
    </div>
    <div class="divider">✿ ✿ ✿</div>
    ${day.dishes.map((d,i) => `<div id="recipe_sec_${i}" class="card fade-in">${renderDish(d,i)}</div>`).join('')}
    <div class="divider">✿ ✿ ✿</div>
    ${day.shopping ? `
    <div class="card fade-in">
      <div class="section-label">Shopping</div>
      <h2 class="section-title">🛒 買い物リスト</h2>
      <p style="font-size:.85rem;color:var(--text-light);margin-bottom:16px">※ 醤油・みりん・塩・砂糖・油など基本調味料は省いています</p>
      <ul class="shop-list">
        ${day.shopping.map((item, i) => `
          <li>
            <div class="shop-check" onclick="toggleCheck(this)" id="chk_${i}">✓</div>
            <span class="shop-item-text">${item}</span>
          </li>
        `).join('')}
      </ul>
    </div>
    <div class="divider">✿ ✿ ✿</div>
    ` : ''}
    <div class="card fade-in">
      <div class="section-label">Nutrition</div>
      <h2 class="section-title">🤰 栄養ポイント</h2>
      <div class="nut-grid">
        ${day.nutrients.map(n => `
          <div class="nut-card ${n.cls}">
            <div class="e">${n.emoji}</div>
            <h4>${n.name}</h4>
            <p>${n.desc}</p>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="closing fade-in">
      <div style="font-size:2rem;margin-bottom:12px">🌷</div>
      <h3>ひとこと</h3>
      <p>${day.comment}</p>
    </div>
  `;
}

function renderArchive() {
  const sorted = [...recipes].reverse();
  return `
    <div class="card">
      <div class="section-label">Archive</div>
      <h2 class="section-title">📅 献立アーカイブ</h2>
      <div class="counter">🍽 全 ${recipes.length} 日分の献立</div>
      ${sorted.map((day, idx) => `
        <div class="archive-item ${isToday(day.date)?'current':''}" onclick="showDay(${recipes.length-1-idx})">
          <div class="archive-date">${fmtDate(day.date)}（${day.weekday}）${isToday(day.date)?'<span style="background:var(--sakura-deep);color:white;font-size:.68rem;padding:2px 8px;border-radius:10px;margin-left:6px">今日</span>':''}</div>
          <div class="archive-menus">${day.dishes.map(d=>d.emoji+' '+d.name).join('　')}</div>
        </div>
      `).join('')}
    </div>
  `;
}

// ===== State =====
let currentView = 'latest';

// 今日の日付に一致するレシピを探す。なければ最新を表示
function isToday(dateStr) {
  const today = new Date();
  const y = today.getFullYear();
  const m = String(today.getMonth() + 1).padStart(2, '0');
  const d = String(today.getDate()).padStart(2, '0');
  return dateStr === `${y}-${m}-${d}`;
}

function getTodayIdx() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  const todayStr = `${yyyy}-${mm}-${dd}`;
  const idx = recipes.findIndex(r => r.date === todayStr);
  return idx >= 0 ? idx : recipes.length - 1;
}

let currentDayIdx = getTodayIdx();

function showView(view) {
  currentView = view;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => { if(t.textContent.includes(view==='latest'?'今日':'アーカイブ')) t.classList.add('active') });
  if (view === 'latest') {
    currentDayIdx = getTodayIdx();
    document.getElementById('latestView').innerHTML = renderDay(recipes[currentDayIdx]);
    document.getElementById('latestView').classList.remove('hidden');
    document.getElementById('archiveView').classList.add('hidden');
  } else {
    document.getElementById('archiveView').innerHTML = renderArchive();
    document.getElementById('archiveView').classList.remove('hidden');
    document.getElementById('latestView').classList.add('hidden');
  }
  observeFadeIn();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function showDay(idx) {
  currentDayIdx = idx;
  document.getElementById('latestView').innerHTML = renderDay(recipes[idx]);
  document.getElementById('latestView').classList.remove('hidden');
  document.getElementById('archiveView').classList.add('hidden');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-tab')[0].classList.add('active');
  currentView = 'latest';
  observeFadeIn();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ===== Toggle =====
function toggleDish(btn, id) {
  const body = document.getElementById(id);
  const isOpen = body.classList.contains('show');
  btn.classList.toggle('open', !isOpen);
  body.classList.toggle('show', !isOpen);
  btn.textContent = isOpen ? '🥄 材料・手順を見る ▼' : '🥄 材料・手順を閉じる ▲';
}

function toggleAll(btn) {
  const bodies = document.querySelectorAll('.recipe-body');
  const buttons = document.querySelectorAll('.toggle-btn');
  const allOpen = Array.from(bodies).every(b => b.classList.contains('show'));
  bodies.forEach(b => b.classList.toggle('show', !allOpen));
  buttons.forEach(b => { b.classList.toggle('open', !allOpen); b.textContent = allOpen ? '🥄 材料・手順を見る ▼' : '🥄 材料・手順を閉じる ▲'; });
  btn.textContent = allOpen ? '📖 すべてのレシピを開く' : '📕 すべてのレシピを閉じる';
}

function toggleCheck(el) {
  el.classList.toggle('checked');
  const text = el.nextElementSibling;
  text.classList.toggle('checked');
}

// ===== Scroll & fade =====
function observeFadeIn() {
  const obs = new IntersectionObserver(e => e.forEach(el => { if(el.isIntersecting) el.target.classList.add('visible') }), {threshold:.1});
  document.querySelectorAll('.fade-in').forEach(el => { el.classList.remove('visible'); obs.observe(el) });
}

window.addEventListener('scroll', () => {
  const s = document.documentElement.scrollTop;
  const h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  document.getElementById('prog').style.width = (s/h)*100 + '%';
});

// ===== Init =====
// 日付→妊娠月数マッピング（表示中の献立の日付に連動）
const monthMap = {
  "2026-03": 8, "2026-04": 9, "2026-05": 10,
  "2026-06": 10, "2026-07": 10
};
function updateMonthLabel() {
  const idx = getTodayIdx();
  const ym = recipes[idx].date.slice(0, 7);
  const m = monthMap[ym] || 10;
  document.getElementById('month-label').textContent = m;
}
updateMonthLabel();
showView('latest');
</script>
</body>
</html>
